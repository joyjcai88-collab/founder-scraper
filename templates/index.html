<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Founder Scraper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 720px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 28px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { color: #888; margin-bottom: 32px; font-size: 14px; }
    .search-form { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; }
    .search-form input { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 12px 16px; color: #e0e0e0; font-size: 15px; outline: none; }
    .search-form input:focus { border-color: #666; }
    .search-form input[name="name"] { flex: 2; min-width: 200px; }
    .search-form input[name="company"] { flex: 1; min-width: 140px; }
    .search-form button { background: #2563eb; color: white; border: none; border-radius: 8px; padding: 12px 24px; font-size: 15px; cursor: pointer; font-weight: 500; }
    .search-form button:hover { background: #1d4ed8; }
    .search-form button:disabled { opacity: 0.5; cursor: not-allowed; }

    .loading { display: none; text-align: center; padding: 48px; color: #888; }
    .loading.active { display: block; }
    .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #333; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error { background: #2d1215; border: 1px solid #5c2328; border-radius: 8px; padding: 16px; margin-bottom: 24px; color: #f87171; display: none; }

    .card { display: none; background: #141414; border: 1px solid #262626; border-radius: 12px; overflow: hidden; }
    .card.active { display: block; }
    .card-header { padding: 24px; border-bottom: 1px solid #262626; }
    .card-header h2 { font-size: 22px; font-weight: 600; }
    .card-header .company { color: #888; font-size: 14px; margin-top: 4px; }

    .overall-score { padding: 24px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #262626; }
    .score-number { font-size: 48px; font-weight: 700; min-width: 80px; }
    .score-label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .score-bar-outer { flex: 1; height: 12px; background: #262626; border-radius: 6px; overflow: hidden; }
    .score-bar-inner { height: 100%; border-radius: 6px; transition: width 0.6s ease; }

    .breakdown { padding: 24px; border-bottom: 1px solid #262626; }
    .breakdown h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 16px; }
    .category { margin-bottom: 16px; }
    .category:last-child { margin-bottom: 0; }
    .cat-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .cat-name { font-size: 14px; font-weight: 500; }
    .cat-score { font-size: 14px; font-weight: 600; }
    .cat-bar-outer { height: 6px; background: #262626; border-radius: 3px; overflow: hidden; margin-bottom: 6px; }
    .cat-bar-inner { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .cat-rationale { font-size: 13px; color: #999; line-height: 1.4; }

    .section { padding: 24px; border-bottom: 1px solid #262626; }
    .section:last-child { border-bottom: none; }
    .section h3 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 12px; }
    .thesis-summary { font-size: 15px; line-height: 1.6; }
    .risk-item { font-size: 14px; line-height: 1.5; padding: 6px 0; padding-left: 16px; position: relative; }
    .risk-item::before { content: "!"; position: absolute; left: 0; color: #f59e0b; font-weight: 700; font-size: 12px; }
    .source-link { display: block; font-size: 13px; color: #60a5fa; text-decoration: none; padding: 4px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .source-link:hover { text-decoration: underline; }

    .score-green { color: #22c55e; }
    .score-yellow { color: #eab308; }
    .score-red { color: #ef4444; }
    .bar-green { background: #22c55e; }
    .bar-yellow { background: #eab308; }
    .bar-red { background: #ef4444; }

    .enrichment-grid { display: grid; gap: 24px; }
    .exp-item, .edu-item { padding: 12px 0; border-bottom: 1px solid #1f1f1f; }
    .exp-item:last-child, .edu-item:last-child { border-bottom: none; }
    .exp-title { font-size: 15px; font-weight: 600; }
    .exp-company { font-size: 14px; color: #60a5fa; }
    .exp-dates { font-size: 13px; color: #888; margin-top: 2px; }
    .edu-school { font-size: 15px; font-weight: 600; }
    .edu-degree { font-size: 14px; color: #999; }
    .skills-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .skill-tag { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 4px 12px; font-size: 13px; color: #94a3b8; }
    .social-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: #60a5fa; text-decoration: none; padding: 4px 0; margin-right: 16px; }
    .social-link:hover { text-decoration: underline; }
    .confidence-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; }
    .confidence-high { background: #14532d; color: #4ade80; }
    .confidence-mid { background: #422006; color: #fbbf24; }
    .confidence-low { background: #450a0a; color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Founder Scraper</h1>
    <p class="subtitle">AI-powered founder enrichment and scoring for VC deal flow</p>

    <div id="linkedinBar" style="display:none; margin-bottom: 16px; padding: 12px 16px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; align-items: center; gap: 12px;">
      <span id="linkedinStatus" style="font-size: 13px; color: #888; flex: 1;"></span>
      <button id="linkedinBtn" style="background: #0a66c2; color: white; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; cursor: pointer; font-weight: 500;">Connect LinkedIn</button>
    </div>

    <form class="search-form" id="searchForm">
      <input type="text" name="name" placeholder="Founder name" required>
      <input type="text" name="company" placeholder="Company (optional)">
      <button type="submit" id="submitBtn">Score</button>
    </form>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Scraping public data and analyzing with Claude...</p>
      <p style="color: #666; font-size: 13px; margin-top: 8px;">This may take 15-30 seconds</p>
    </div>

    <div class="error" id="error"></div>

    <div class="card" id="card">
      <div class="card-header">
        <h2 id="founderName"></h2>
        <div class="company" id="founderCompany"></div>
      </div>

      <div class="overall-score">
        <div>
          <div class="score-number" id="overallScore"></div>
          <div class="score-label">Overall Score</div>
        </div>
        <div style="flex:1">
          <div class="score-bar-outer">
            <div class="score-bar-inner" id="overallBar"></div>
          </div>
        </div>
      </div>

      <div class="breakdown">
        <h3>Category Breakdown</h3>
        <div id="categories"></div>
      </div>

      <div class="section" id="thesisSection">
        <h3>Thesis Fit</h3>
        <p class="thesis-summary" id="thesisSummary"></p>
      </div>

      <div class="section" id="risksSection">
        <h3>Key Risks</h3>
        <div id="risks"></div>
      </div>

      <div class="section" id="confidenceSection" style="display:none">
        <h3>Match Confidence</h3>
        <div id="confidence"></div>
      </div>

      <div class="section" id="experienceSection" style="display:none">
        <h3>Work Experience</h3>
        <div id="experience"></div>
      </div>

      <div class="section" id="educationSection" style="display:none">
        <h3>Education</h3>
        <div id="education"></div>
      </div>

      <div class="section" id="skillsSection" style="display:none">
        <h3>Skills</h3>
        <div id="skills" class="skills-list"></div>
      </div>

      <div class="section" id="socialsSection" style="display:none">
        <h3>Social Profiles</h3>
        <div id="socials"></div>
      </div>

      <div class="section" id="sourcesSection">
        <h3>Sources</h3>
        <div id="sources"></div>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('searchForm');
    const loading = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const card = document.getElementById('card');
    const submitBtn = document.getElementById('submitBtn');

    // --- LinkedIn OAuth ---
    const linkedinBar = document.getElementById('linkedinBar');
    const linkedinStatus = document.getElementById('linkedinStatus');
    const linkedinBtn = document.getElementById('linkedinBtn');

    async function checkLinkedIn() {
      try {
        const resp = await fetch('/api/linkedin/status');
        const data = await resp.json();
        if (!data.configured) {
          linkedinBar.style.display = 'none';
          return;
        }
        linkedinBar.style.display = 'flex';
        if (data.connected && data.profile) {
          linkedinStatus.textContent = `LinkedIn connected: ${data.profile.name || data.profile.email || 'Connected'}`;
          linkedinStatus.style.color = '#4ade80';
          linkedinBtn.textContent = 'Disconnect';
          linkedinBtn.style.background = '#333';
          linkedinBtn.onclick = disconnectLinkedIn;
        } else {
          linkedinStatus.textContent = 'Connect your LinkedIn for enhanced profile data';
          linkedinStatus.style.color = '#888';
          linkedinBtn.textContent = 'Connect LinkedIn';
          linkedinBtn.style.background = '#0a66c2';
          linkedinBtn.onclick = connectLinkedIn;
        }
      } catch (e) {
        linkedinBar.style.display = 'none';
      }
    }

    function connectLinkedIn() {
      const w = window.open('/api/linkedin/connect', 'linkedin_oauth', 'width=600,height=700');
      window.addEventListener('message', function handler(evt) {
        if (evt.data?.type === 'linkedin_connected') {
          window.removeEventListener('message', handler);
          checkLinkedIn();
        }
      });
    }

    async function disconnectLinkedIn() {
      await fetch('/api/linkedin/disconnect');
      checkLinkedIn();
    }

    // Check LinkedIn status on page load
    checkLinkedIn();

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function scoreColor(score) {
      if (score >= 70) return 'green';
      if (score >= 45) return 'yellow';
      return 'red';
    }

    function renderCategory(name, weight, score, rationale) {
      const color = scoreColor(score);
      return `
        <div class="category">
          <div class="cat-header">
            <span class="cat-name">${name} (${weight})</span>
            <span class="cat-score score-${color}">${score}</span>
          </div>
          <div class="cat-bar-outer">
            <div class="cat-bar-inner bar-${color}" style="width: ${score}%"></div>
          </div>
          <div class="cat-rationale">${rationale}</div>
        </div>
      `;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = form.name.value.trim();
      const company = form.company.value.trim();

      if (!name) return;

      loading.classList.add('active');
      card.classList.remove('active');
      errorEl.style.display = 'none';
      submitBtn.disabled = true;

      try {
        const resp = await fetch('/api/score', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, company: company || null }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({ detail: 'Request failed' }));
          throw new Error(err.detail || `Error ${resp.status}`);
        }

        const resp_data = await resp.json();
        const data = resp_data.card;
        const enrichment = resp_data.enrichment;
        const b = data.breakdown;
        const color = scoreColor(data.overall_score);

        document.getElementById('founderName').textContent = data.name;
        document.getElementById('founderCompany').textContent = data.company || '';

        const scoreEl = document.getElementById('overallScore');
        scoreEl.textContent = Math.round(data.overall_score);
        scoreEl.className = `score-number score-${color}`;

        const bar = document.getElementById('overallBar');
        bar.style.width = `${data.overall_score}%`;
        bar.className = `score-bar-inner bar-${color}`;

        document.getElementById('categories').innerHTML = [
          renderCategory('Founder Quality', '30%', b.founder_quality, b.founder_quality_rationale),
          renderCategory('Market', '25%', b.market, b.market_rationale),
          renderCategory('Traction', '25%', b.traction, b.traction_rationale),
          renderCategory('Network', '10%', b.network, b.network_rationale),
          renderCategory('Intangibles', '10%', b.intangibles, b.intangibles_rationale),
        ].join('');

        document.getElementById('thesisSummary').textContent = data.thesis_fit_summary || 'N/A';

        const risksEl = document.getElementById('risks');
        risksEl.innerHTML = (data.key_risks || []).map(r => `<div class="risk-item">${r}</div>`).join('');
        document.getElementById('risksSection').style.display = data.key_risks?.length ? '' : 'none';

        // Enrichment: PDL data
        const confSection = document.getElementById('confidenceSection');
        const expSection = document.getElementById('experienceSection');
        const eduSection = document.getElementById('educationSection');
        const skillsSection = document.getElementById('skillsSection');
        const socialsSection = document.getElementById('socialsSection');

        if (enrichment) {
          // Match confidence
          if (enrichment.likelihood > 0) {
            const l = enrichment.likelihood;
            const cls = l >= 7 ? 'confidence-high' : l >= 4 ? 'confidence-mid' : 'confidence-low';
            document.getElementById('confidence').innerHTML =
              `<span class="confidence-badge ${cls}">${l}/10 match confidence</span>
               <span style="color:#888;font-size:13px;margin-left:12px">How likely this data matches the queried person</span>`;
            confSection.style.display = '';
          } else { confSection.style.display = 'none'; }

          // Work experience
          if (enrichment.experience?.length) {
            document.getElementById('experience').innerHTML = enrichment.experience.map(exp =>
              `<div class="exp-item">
                <div class="exp-title">${esc(exp.title || 'Unknown Role')}</div>
                <div class="exp-company">${esc(exp.company || 'Unknown Company')}</div>
                <div class="exp-dates">${esc(exp.start_date || '?')} — ${esc(exp.end_date || 'Present')}</div>
              </div>`
            ).join('');
            expSection.style.display = '';
          } else { expSection.style.display = 'none'; }

          // Education
          if (enrichment.education?.length) {
            document.getElementById('education').innerHTML = enrichment.education.map(edu => {
              const degree = [edu.degree, edu.major].filter(Boolean).join(' in ');
              return `<div class="edu-item">
                <div class="edu-school">${esc(edu.school || 'Unknown School')}</div>
                ${degree ? `<div class="edu-degree">${esc(degree)}</div>` : ''}
              </div>`;
            }).join('');
            eduSection.style.display = '';
          } else { eduSection.style.display = 'none'; }

          // Skills
          if (enrichment.skills?.length) {
            document.getElementById('skills').innerHTML = enrichment.skills.map(s =>
              `<span class="skill-tag">${esc(s)}</span>`
            ).join('');
            skillsSection.style.display = '';
          } else { skillsSection.style.display = 'none'; }

          // Social profiles
          const socials = enrichment.social_profiles || [];
          if (enrichment.linkedin_url) socials.unshift(enrichment.linkedin_url);
          const uniqueSocials = [...new Set(socials)];
          if (uniqueSocials.length) {
            document.getElementById('socials').innerHTML = uniqueSocials.map(url => {
              let label = 'Link';
              if (url.includes('linkedin')) label = 'LinkedIn';
              else if (url.includes('twitter') || url.includes('x.com')) label = 'Twitter';
              else if (url.includes('github')) label = 'GitHub';
              else if (url.includes('facebook')) label = 'Facebook';
              return `<a class="social-link" href="${esc(url)}" target="_blank" rel="noopener">${label}: ${esc(url)}</a>`;
            }).join('');
            socialsSection.style.display = '';
          } else { socialsSection.style.display = 'none'; }
        } else {
          confSection.style.display = 'none';
          expSection.style.display = 'none';
          eduSection.style.display = 'none';
          skillsSection.style.display = 'none';
          socialsSection.style.display = 'none';
        }

        const sourcesEl = document.getElementById('sources');
        sourcesEl.innerHTML = (data.source_links || []).map(s =>
          `<a class="source-link" href="${s}" target="_blank" rel="noopener">${s}</a>`
        ).join('');
        document.getElementById('sourcesSection').style.display = data.source_links?.length ? '' : 'none';

        card.classList.add('active');
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      } finally {
        loading.classList.remove('active');
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
